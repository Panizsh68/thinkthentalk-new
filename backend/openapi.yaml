        city:
          type: string
        address:
          type: string
        startDateTime:
          type: string
          format: date-time
        endDateTime:
          type: string
          format: date-time
        capacityTotal:
          type: integer
        showRemainingCapacity:
          type: boolean
        publicDiscountIds:
          type: array
          items:
            type: string
        posterUrl:
          type: string
          format: uri
    UpdateEventFormData:
      type: object
