        - showRemainingCapacity
      properties:
        title:
          type: string
        categories:
          type: string
        summary:
          type: object
          properties:
            fa:
              type: string
            en:
              type: string
        description:
          type: object
          properties:
            fa:
              type: string
            en:
              type: string
        type:
          type: string
          enum:
            - ONLINE
