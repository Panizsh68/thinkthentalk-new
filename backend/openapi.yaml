        endDateTime:
          type: string
          format: date-time
        capacityTotal:
          type: integer
        capacityRemaining:
          type: integer
        showRemainingCapacity:
          type: boolean
        categories:
          type: array
          items:
            type: string
        tickets:
          type: array
          items:
            $ref: '#/components/schemas/EventTicketConfig'
        resources:
          type: array
          items:
            $ref: '#/components/schemas/EventResource'
        publicDiscountIds:
