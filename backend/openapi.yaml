openapi: 3.0.3
info:
  title: Think Then Talk API
  description: The complete API specification for the Think Then Talk event platform.
  version: 1.0.0
servers:
  - url: http://localhost:3000/api
    description: Development server
tags:
  - name: Auth
    description: User and Admin Authentication
  - name: Users
    description: User profile management
  - name: Events
    description: Public operations for events
  - name: Registrations
    description: User-facing registration and payment flow
  - name: Payments
    description: Operations related to payment processing
  - name: Discounts
    description: Operations for managing and validating discount codes
  - name: Content Management
    description: Admin operations for managing site content like Sponsors and Team members
  - name: Feedback
    description: Operations for managing event feedback forms and viewing responses
  - name: Messaging
    description: Admin tools for bulk messaging
  - name: Admin
    description: General admin utilities like statistics and exports
paths:
  /auth/request-otp:
    post:
      tags:
        - Auth
      summary: Request an OTP
      description: Initiates the login process by sending a one-time password to the user's mobile number.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestOtpBody'
      responses:
        '200':
          description: OTP sent successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '400':
          description: Invalid mobile number format.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Too many requests.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /auth/verify-otp:
    post:
      tags:
        - Auth
      summary: Verify OTP
      description: Verifies the OTP and logs the user in. Token is returned in the Authorization header.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOtpBody'
      responses:
        '200':
          description: Login successful.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Invalid OTP.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Too many requests.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /users/me:
    get:
      tags:
        - Users
      summary: Get My Profile
      description: Retrieves the profile of the currently authenticated user.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Not authenticated.
    patch:
      tags:
        - Users
      summary: Update My Profile
      description: Updates the profile of the currently authenticated user.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserProfileBody'
      responses:
        '200':
          description: Profile updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid data provided.
        '401':
          description: Not authenticated.
  /admin/login:
    post:
      tags:
        - Auth
      summary: Admin Login
      description: Authenticates an admin user via email and password. Token is returned in the Authorization header.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginBody'
      responses:
        '200':
          description: Admin login successful.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/AdminUser'
        '401':
          description: Invalid credentials.
        '429':
          description: Too many requests.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /events:
    get:
      tags:
        - Events
      summary: List Events
      description: Returns a list of events, with optional filters.
      parameters:
        - name: showPastEvents
          in: query
          schema:
            type: boolean
          description: Whether to include events that have already passed.
        - name: type
          in: query
          schema:
            type: string
            enum:
              - ONLINE
              - OFFLINE
          description: Filter by event type.
        - name: city
          in: query
          schema:
            type: string
          description: Filter by city for offline events.
        - name: category
          in: query
          schema:
            type: string
          description: Filter by a specific category.
        - name: "categories[]"
          in: "query"
          schema:
            type: "array"
            items:
              type: "string"
          style: "form"
          explode: true
          description: "Filter by multiple categories. Example: ?categories[]=design&categories[]=tech"
        - name: "dateRange[from]"
          in: "query"
          schema:
            type: "string"
            format: "date-time"
          description: "Filter events starting from this date/time (inclusive)."
        - name: "dateRange[to]"
          in: "query"
          schema:
            type: "string"
            format: "date-time"
          description: "Filter events up to this date/time (inclusive)."
      responses:
        '200':
          description: A list of events.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
  /events/{eventId}:
    get:
      tags:
        - Events
      summary: Get Event Details
      description: Returns the full details for a single event.
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Event details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '404':
          description: Event not found.
  /admin/events:
    get:
      tags:
        - Admin
      summary: List All Events (Admin)
      description: Retrieves a list of all events for the admin panel, including past events.
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
          description: Page number for pagination (optional, default 1)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
          description: Items per page (optional, default 20)
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
          description: Sort field (optional, e.g., 'startDateTime')
        - name: sortOrder
          in: query
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
          description: "Sort order (optional, 'asc' or 'desc')"
      responses:
        '200':
          description: A list of all events.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags:
        - Admin
      summary: Create Event (Admin)
      description: Creates a new event.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventFormData'
      responses:
        '201':
          description: Event created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/admin/events/{eventId}':
    get:
      tags:
        - Admin
      summary: Get Event (Admin)
      description: Retrieves a single event for editing in the admin panel.
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Event data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '404':
          description: Event not found.
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      tags:
        - Admin
      summary: Update Event (Admin)
      description: Updates the core details of an event.
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEventFormData'
      responses:
        '200':
          description: Event updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '404':
          description: Event not found.
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/admin/events/{eventId}/tickets':
    patch:
      tags:
        - Admin
      summary: Update Event Tickets (Admin)
      description: Updates the ticket configuration for a specific event.
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/EventTicketConfig'
      responses:
        '200':
          description: Ticket configuration updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '404':
          description: Event not found.
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/admin/events/{eventId}/resources':
    patch:
      tags:
        - Admin
      summary: Update Event Resources (Admin)
      description: Updates the list of downloadable or linkable resources for an event.
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/EventResource'
      responses:
        '200':
          description: Resources updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '404':
          description: Event not found.
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /registrations/me:
    get:
      tags:
        - Registrations
      summary: Get My Registrations
      description: Returns a list of all registrations for the currently authenticated user.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: A list of user's registrations.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserRegistration'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /payments:
    post:
      tags:
        - Payments
      summary: Create Registration and Payment
      description: Creates a new event registration for the authenticated user and initiates a payment record. The frontend calls this single endpoint to start the checkout process.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentBody'
      responses:
        '201':
          description: Registration initiated, payment record created. Returns a payment object to redirect the user to the payment gateway.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '400':
          description: Invalid input data (e.g., validation error on formData) or event capacity is full.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/payments/{paymentId}':
    get:
      tags:
        - Payments
      summary: Get Payment Details
      description: Retrieves the details and status of a single payment record. Used by the frontend on the callback page to check the status.
      security:
        - bearerAuth: []
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Payment details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '404':
          description: Payment record not found.
    post:
      tags:
        - Payments
      summary: Verify Payment Status
      description: Endpoint for the frontend to confirm payment status after returning from the payment gateway.
      security:
        - bearerAuth: []
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum:
                    - SUCCESS
                    - FAILED
      responses:
        '200':
          description: Payment status updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '404':
          description: Payment record not found.
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /admin/registrations:
    get:
      tags:
        - Admin
      summary: List All Registrations (Admin)
      description: Retrieves a detailed list of all user registrations for the admin panel.
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
          description: Page number (default: 1)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
          description: Items per page (default: 20)
      responses:
        '200':
          description: A list of registrations.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserRegistrationDetails'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/admin/registrations/{registrationId}':
    get:
      tags:
        - Admin
      summary: Get Registration Details (Admin)
      description: Retrieves full details for a single registration.
      security:
        - bearerAuth: []
      parameters:
        - name: registrationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Registration details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRegistrationDetails'
        '404':
          description: Registration not found.
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      tags:
        - Admin
      summary: Update Registration (Admin)
      description: Manually updates a registration's status or the user's submitted form data.
      security:
        - bearerAuth: []
      parameters:
        - name: registrationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        description: Send only the fields you want to update. Both fields are optional.
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum:
                    - PAID
                    - PENDING
                    - FAILED
                    - CANCELLED
                formData:
                  $ref: '#/components/schemas/RegistrationFormData'
      responses:
        '200':
          description: Registration updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRegistrationDetails'
        '404':
          description: Registration not found.
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /admin/payments:
    get:
      tags:
        - Admin
      summary: List All Payments (Admin)
      description: Retrieves a list of all payment records for financial overview.
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: query
          required: false
          schema:
            type: string
          description: Filter by event ID
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - PENDING
              - SUCCESS
              - FAILED
          description: Filter by payment status
      responses:
        '200':
          description: A list of payments.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Payment'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /discounts/validate:
    post:
      tags:
        - Discounts
      summary: Validate a Discount Code
      description: Checks if a discount code is valid for a given event and price, and returns the discount details if it is.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateDiscountBody'
      responses:
        '200':
          description: Discount code is valid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Discount'
        '400':
          description: Discount is not valid for one or more reasons (e.g., expired, not applicable, etc.).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /admin/discounts:
    get:
      tags:
        - Admin
      summary: List Discounts (Admin)
      description: Retrieves a list of all discounts for the admin panel.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: A list of all discounts.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Discount'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags:
        - Admin
      summary: Create Discount (Admin)
      description: Creates a new discount code or automatic offer.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiscountFormData'
      responses:
        '201':
          description: Discount created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Discount'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '400':
          description: Invalid discount data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/admin/discounts/{discountId}':
    patch:
      tags:
        - Admin
      summary: Update Discount (Admin)
      description: Updates an existing discount.
      security:
        - bearerAuth: []
      parameters:
        - name: discountId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiscountFormData'
      responses:
        '200':
          description: Discount updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Discount'
        '404':
          description: Discount not found.
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '400':
          description: Invalid discount data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
        - Admin
      summary: Delete Discount (Admin)
      description: Deletes a discount.
      security:
        - bearerAuth: []
      parameters:
        - name: discountId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Discount deleted successfully.
        '404':
          description: Discount not found.
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /sponsors:
    get:
      tags:
        - Content Management
      summary: List Public Sponsors
      description: Retrieves the list of sponsors for public display.
      responses:
        '200':
          description: A list of sponsors.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Sponsor'
  /admin/sponsors:
    get:
      tags:
        - Content Management
      summary: List All Sponsors (Admin)
      description: Retrieves all sponsors for the admin panel.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: A list of all sponsors.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Sponsor'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags:
        - Content Management
      summary: Create Sponsor (Admin)
      description: Adds a new sponsor.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SponsorFormData'
      responses:
        '201':
          description: Sponsor created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sponsor'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '400':
          description: Invalid data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/admin/sponsors/{sponsorId}':
    patch:
      tags:
        - Content Management
      summary: Update Sponsor (Admin)
      description: Updates an existing sponsor's details.
      security:
        - bearerAuth: []
      parameters:
        - name: sponsorId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
