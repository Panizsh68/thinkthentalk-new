components:
  schemas:
    Error:
      type: object
      properties:
        message:
          type: string
          description: A human-readable error message.
      required:
        - message
    RequestOtpBody:
      type: object
      properties:
        mobile:
          type: string
          description: The user's 11-digit mobile number.
          example: '09123456789'
      required:
        - mobile
    VerifyOtpBody:
      type: object
      properties:
        mobile:
          type: string
          example: '09123456789'
        otp:
          type: string
          description: The 6-digit one-time password.
          example: '123456'
      required:
        - mobile
        - otp
    AdminLoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
      required:
        - email
        - password
    ValidateDiscountBody:
      type: object
      required:
        - code
        - eventId
        - ticketPrice
      properties:
        code:
          type: string
          description: The discount code to validate.
        eventId:
          type: string
          description: The ID of the event the code is being applied to.
        ticketPrice:
          type: number
          description: The original price of the ticket before discount.
    CreatePaymentBody:
      type: object
      description: The data required to initiate a payment for a registration.
      properties:
        eventId:
          type: string
        ticketType:
          $ref: '#/components/schemas/TicketType'
        amount:
          type: number
        currency:
          type: string
          enum:
            - TOMAN
            - IRR
        formData:
          $ref: '#/components/schemas/RegistrationFormData'
      required:
        - eventId
        - ticketType
        - amount
        - currency
        - formData
    TicketType:
      type: string
      enum:
        - EARLY_BIRD
        - STANDARD
        - SUPPORTER
    User:
      type: object
      required:
        - id
        - firstNameFa
        - lastNameFa
        - mobile
      properties:
        id:
          type: string
          description: The unique identifier for the user.
        firstNameFa:
          type: string
          description: User's first name in Persian.
        lastNameFa:
          type: string
          description: User's last name in Persian.
        firstNameEn:
          type: string
        lastNameEn:
          type: string
        gender:
          type: string
          enum:
            - MALE
            - FEMALE
            - OTHER
        age:
          type: number
          format: int32
        educationLevel:
          type: string
        fieldOfStudy:
          type: string
        isEmployed:
          type: boolean
        jobTitle:
          type: string
        mobile:
          type: string
          description: The user's primary mobile number (unique).
        email:
          type: string
          format: email
        languageLevel:
          type: string
    UpdateUserProfileBody:
      type: object
      description: Schema for partially updating a user's profile. All fields are optional.
      properties:
        firstNameFa:
          type: string
          description: User's first name in Persian.
        lastNameFa:
          type: string
          description: User's last name in Persian.
        firstNameEn:
          type: string
        lastNameEn:
          type: string
        gender:
          type: string
          enum:
            - MALE
            - FEMALE
            - OTHER
        age:
          type: number
          format: int32
        educationLevel:
          type: string
        fieldOfStudy:
          type: string
        isEmployed:
          type: boolean
        jobTitle:
          type: string
        mobile:
          type: string
          description: The user's primary mobile number (unique).
        email:
          type: string
          format: email
        languageLevel:
          type: string
    RegistrationFormData:
      type: object
      description: The full set of data collected during user registration for an event.
      required:
        - firstNameFa
        - lastNameFa
        - mobile
        - isEmployed
        - acceptedRules
      properties:
        firstNameFa:
          type: string
        lastNameFa:
          type: string
        firstNameEn:
          type: string
        lastNameEn:
          type: string
        age:
          type: number
        gender:
          type: string
          enum:
            - MALE
            - FEMALE
            - OTHER
        mobile:
          type: string
          description: User's mobile number used during registration.
        email:
          type: string
          format: email
        educationLevel:
          type: string
        fieldOfStudy:
          type: string
        isEmployed:
          type: boolean
        jobTitle:
          type: string
        languageLevel:
          type: string
        referralSource:
          type: string
        referrerName:
          type: string
        otherReferralSource:
          type: string
        acceptedRules:
          type: boolean
    AdminUser:
      type: object
      required:
        - id
        - email
        - name
        - role
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum:
            - ADMIN
            - EVENT_MANAGER
            - FINANCE
    AdminUserWithPassword:
      type: object
      allOf:
        - $ref: '#/components/schemas/AdminUser'
        - type: object
          required:
            - password
          properties:
            password:
              type: string
              format: password
    Discount:
      type: object
      required:
        - id
        - name
        - type
        - value
        - usedCount
        - startDate
        - endDate
        - isActive
        - isPublic
      properties:
        id:
          type: string
        name:
          type: string
        code:
          type: string
        type:
          type: string
          enum:
            - PERCENT
            - FIXED
        value:
          type: number
        applicableEventIds:
          type: array
          items:
            type: string
        maxUses:
          type: integer
        usedCount:
          type: integer
        maxUsesPerUser:
          type: integer
        minAmount:
          type: number
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        isActive:
          type: boolean
        isPublic:
          type: boolean
    DiscountFormData:
      type: object
      required:
        - name
        - type
        - value
        - startDate
        - endDate
        - isActive
        - isPublic
      properties:
        name:
          type: string
        code:
          type: string
        type:
          type: string
          enum:
            - PERCENT
            - FIXED
        value:
          type: number
        applicableEventIds:
          type: array
          items:
            type: string
        maxUses:
          type: integer
        maxUsesPerUser:
          type: integer
        minAmount:
          type: number
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        isActive:
          type: boolean
        isPublic:
          type: boolean
    EvaluationAnswers:
      type: object
      description: A map of question IDs to their answers.
      additionalProperties:
        oneOf:
          - type: string
          - type: number
    EvaluationForm:
      type: object
      required:
        - id
        - eventId
        - questions
        - submitted
      properties:
        id:
          type: string
        eventId:
          type: string
        questions:
          type: array
          items:
            $ref: '#/components/schemas/EvaluationQuestion'
        submitted:
          type: boolean
          description: Indicates if the current user has already submitted this form.
    EvaluationQuestion:
      type: object
      required:
        - id
        - type
        - label
        - required
      properties:
        id:
          type: string
        type:
          type: string
          enum:
            - RATING
            - TEXT
        label:
          type: string
        required:
          type: boolean
    EvaluationResponse:
      type: object
      required:
        - submission
        - user
        - questions
      properties:
        submission:
          $ref: '#/components/schemas/EvaluationSubmission'
        user:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            mobile:
              type: string
        questions:
          type: array
          items:
            $ref: '#/components/schemas/EvaluationQuestion'
    EvaluationSubmission:
